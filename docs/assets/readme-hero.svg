<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex Artifact Gateway</title>
  <desc id="desc">A Mac serves local Codex HTML artifacts over Tailscale to an iPhone, with feedback saved locally.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#eef6f3"/>
      <stop offset="1" stop-color="#f7efe5"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#059669"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
      .muted{fill:#4b5563}
      .mono{font-family:"SFMono-Regular","Cascadia Mono","Liberation Mono",monospace}
      .card{fill:#ffffff;stroke:#d8dee8;stroke-width:2}
      .chip{fill:#eef2ff;stroke:#c7d2fe;stroke-width:1.5}
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect x="64" y="56" width="1472" height="408" rx="28" fill="#ffffff" opacity="0.58" stroke="#e5e7eb"/>

  <g transform="translate(124 92)">
    <text class="label" x="0" y="0" font-size="48" font-weight="750">Codex Artifact Gateway</text>
    <text class="label muted" x="0" y="45" font-size="25">Open local Codex HTML artifacts on your iPhone without publishing them to the internet.</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="128" y="188" width="420" height="218" rx="22"/>
    <rect x="158" y="222" width="360" height="24" rx="8" fill="#111827"/>
    <rect x="158" y="266" width="260" height="16" rx="8" fill="#d1d5db"/>
    <rect x="158" y="296" width="314" height="16" rx="8" fill="#d1d5db"/>
    <rect x="158" y="326" width="222" height="16" rx="8" fill="#d1d5db"/>
    <rect x="158" y="366" width="116" height="22" rx="11" fill="#dcfce7"/>
    <text class="label mono" x="296" y="383" font-size="18">report.html</text>
  </g>

  <g>
    <path d="M 584 298 C 704 218, 846 218, 966 298" fill="none" stroke="url(#line)" stroke-width="14" stroke-linecap="round"/>
    <circle cx="584" cy="298" r="12" fill="#2563eb"/>
    <circle cx="966" cy="298" r="12" fill="#d97706"/>
    <rect class="chip" x="680" y="160" width="206" height="52" rx="26"/>
    <text class="label" x="722" y="194" font-size="22" font-weight="700">Tailscale</text>
    <rect class="chip" x="650" y="338" width="268" height="52" rx="26" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text class="label" x="693" y="372" font-size="22" font-weight="700">Tailnet only</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="1014" y="158" width="250" height="292" rx="36"/>
    <rect x="1070" y="184" width="138" height="10" rx="5" fill="#111827"/>
    <rect x="1044" y="218" width="190" height="168" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
    <rect x="1065" y="244" width="118" height="18" rx="9" fill="#111827"/>
    <rect x="1065" y="278" width="144" height="12" rx="6" fill="#d1d5db"/>
    <rect x="1065" y="304" width="128" height="12" rx="6" fill="#d1d5db"/>
    <rect x="1065" y="342" width="74" height="28" rx="14" fill="#bfdbfe"/>
    <rect x="1150" y="342" width="66" height="28" rx="14" fill="#fef3c7"/>
    <text class="label" x="1062" y="424" font-size="22" font-weight="700">iPhone review</text>
  </g>

  <g transform="translate(1320 214)">
    <rect x="0" y="0" width="132" height="42" rx="21" fill="#ecfeff" stroke="#a5f3fc"/>
    <text class="label" x="25" y="28" font-size="18" font-weight="700">/recent</text>
    <rect x="0" y="62" width="132" height="42" rx="21" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text class="label" x="18" y="90" font-size="18" font-weight="700">/resolve</text>
    <rect x="0" y="124" width="132" height="42" rx="21" fill="#fff7ed" stroke="#fed7aa"/>
    <text class="label" x="18" y="152" font-size="18" font-weight="700">feedback</text>
  </g>
</svg>
